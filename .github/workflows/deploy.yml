name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
        # The publishable (anon) key is safe to expose — it ships in the browser
        # bundle and RLS is what protects the data. To rotate it or avoid keeping
        # it in the workflow, move these to repo Actions "Variables" and reference
        # them as ${{ vars.NAME }}.
        env:
          VITE_SUPABASE_URL: https://doqokatwfbetiasadnfb.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_C1QhXW-JnN33uOrvxMBpiQ_vB9RyRFZ
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
